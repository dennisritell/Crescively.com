<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crescively</title>
<style>
  :root {
    --bg: #0a1420;
    --panel: #0f1f2e;
    --text: #e8f1f2;
    --muted: #9db3bd;
    --accent: #3ee6a8;
    --accent-blue: #4fb0e8;
    --border: #1c3040;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.6;
  }

  header img {
    display: block;
    width: 100%;
    height: auto;
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  section {
    padding: 32px 0;
    border-bottom: 1px solid var(--border);
  }

  section:last-child {
    border-bottom: none;
  }

  h2 {
    margin: 0 0 12px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  p {
    margin: 0;
    font-size: 17px;
    color: var(--text);
  }

  a {
    color: var(--accent-blue);
    text-decoration: none;
    border-bottom: 1px solid rgba(79, 176, 232, 0.4);
  }

  a:hover {
    border-bottom-color: var(--accent-blue);
  }

  .muted {
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <img src="Website_Header_Image.png" alt="crescively">
</header>

<main>
  <section>
    <h2>Purpose</h2>
    <p>Make things that are just okay much better. This website is just okay, and some day it will be better too.</p>
  </section>

  <section>
    <h2>Support</h2>
    <p>Contact us at <a href="mailto:support@crescively.com">support@crescively.com</a></p>
  </section>
</main>

</body>
</html>
